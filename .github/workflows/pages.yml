name: Documentation Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "docs-build"
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Job 1: Build HTML for GitHub Pages
  # ------------------------------------------------------------------
  build-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build HTML
        run: sphinx-build -b html source _build/html

      - name: Upload HTML artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  # ------------------------------------------------------------------
  # Job 2: Build PDF using XeLaTeX
  # ------------------------------------------------------------------
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build LaTeX
        run: sphinx-build -b latex source _build/latexpdf

      - name: Build PDF with XeLaTeX
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: '2025'
          scheme: 'full'
          run: |
            # Install Chinese fonts (Alpine Linux)
            apk add font-noto-cjk || true
            # Find the Chinese font path
            fc-list :lang=zh 2>/dev/null || echo "No Chinese fonts found"
            # Build PDF (use -f to force despite errors)
            cd _build/latexpdf
            latexmk -pdf -f -file-line-error -interaction=nonstopmode *.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: RMTDataPro-PDF
          path: _build/latexpdf/*.pdf

  # ------------------------------------------------------------------
  # Job 3: Build DOCX using Pandoc
  # ------------------------------------------------------------------
  build-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pandoc
        run: |
          # Download pandoc from GitHub releases (more reliable)
          curl -sL https://github.com/jgm/pandoc/releases/download/3.1.13/pandoc-3.1.13-linux-amd64.tar.gz | tar xz
          sudo mv pandoc-3.1.13/bin/pandoc /usr/local/bin/
          sudo chmod +x /usr/local/bin/pandoc
          pandoc --version

      - name: Install dependencies
        run: pip install -r requirements.txt beautifulsoup4

      - name: Build HTML
        run: sphinx-build -b html source _build/html

      - name: Build DOCX
        run: |
          # Merge all HTML pages into single document for full content
          python3 << 'PYEOF'
          import os
          import re
          from bs4 import BeautifulSoup

          base_dir = "_build/html"
          output_file = "_build/merged.html"

          # Order of pages to include
          pages = [
              "intro/index.html",
              "intro/install.html",
              "intro/quickstart.html",
              "chapters/ui-reference.html",
              "chapters/chapter_rmt_theory.html",
              "chapters/data-import.html",
              "chapters/fft-processing.html",
              "chapters/processing-workflow.html",
              "chapters/data-export.html",
          ]

          # Start with index.html as base
          with open(os.path.join(base_dir, "index.html"), "r", encoding="utf-8") as f:
              soup = BeautifulSoup(f.read(), "html.parser")

          # Remove toctree/nav elements from body to avoid duplication
          for nav in soup.find_all("nav"):
              nav.decompose()
          for toc in soup.find_all("div", class_="wy-menu"):
              toc.decompose()
          for toctree in soup.find_all("ul", class_="toctree"):
              toctree.decompose()

          # Find main content area
          main = soup.find("div", class_="wy-nav-content")
          if main is None:
              main = soup.find("main") or soup.find("div", role="main")

          # Add content from each page
          for page in pages:
              page_path = os.path.join(base_dir, page)
              if os.path.exists(page_path):
                  with open(page_path, "r", encoding="utf-8") as f:
                      page_soup = BeautifulSoup(f.read(), "html.parser")
                  page_main = page_soup.find("div", class_="wy-nav-content") or page_soup.find("main") or page_soup.find("div", role="main")
                  if page_main:
                      # Add section title
                      title = page_soup.find("title")
                      if title:
                          h1 = soup.new_tag("h1")
                          h1.string = title.string
                          main.append(h1)
                      # Append body content (excluding nav/header/footer)
                      for tag in page_main.find_all(["nav", "header", "footer", "script"]):
                          tag.decompose()
                      main.append(page_main)

          # Clean up excessive whitespace
          for tag in soup.find_all(["div", "section"]):
              if tag.get("class") and "toctree" in " ".join(tag.get("class", [])):
                  tag.decompose()

          with open(output_file, "w", encoding="utf-8") as f:
              f.write(str(soup))

          print(f"Merged HTML written to {output_file}")
          PYEOF

          # Convert merged HTML to DOCX
          pandoc _build/merged.html \
            --from=html+tex_math_double_backslash \
            --to=docx \
            --toc --toc-depth=3 \
            --resource-path=_build/html \
            --output=_build/RMTDataPro文档.docx

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: RMTDataPro-DOCX
          path: _build/RMTDataPro文档.docx

  # ------------------------------------------------------------------
  # Job 4: Deploy HTML to GitHub Pages
  # ------------------------------------------------------------------
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-html
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ------------------------------------------------------------------
  # Job 5: Create GitHub Release with PDF and DOCX
  # ------------------------------------------------------------------
  create-release:
    needs: [build-pdf, build-docx]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: RMTDataPro-PDF
          path: artifacts

      - name: Download DOCX artifact
        uses: actions/download-artifact@v4
        with:
          name: RMTDataPro-DOCX
          path: artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            artifacts/*.pdf
            artifacts/*.docx
          draft: false
          prerelease: false
          generateReleaseNotes: true
          commit: master
          tag: release-${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
